<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Macro Imóveis • Apartamentos Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #0f274d;
      --primary-dark: #081c38;
      --accent: #d4a017;
      --light: #f8f9fa;
      --gray: #6c757d;
      --dark: #212529;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--dark);
      background: var(--light);
      line-height: 1.6;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
    }

    /* Header / Navbar */
    header {
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      background: rgba(15, 39, 77, 0.95);
      backdrop-filter: blur(8px);
      transition: all 0.3s;
    }

    header.scrolled {
      background: var(--primary-dark);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.2rem 5%;
    }

    .logo {
      color: white;
      font-size: 1.8rem;
      font-weight: 700;
      text-decoration: none;
    }

    .logo span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .menu-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
    }

    .menu-toggle span {
      width: 28px;
      height: 3px;
      background: white;
      transition: all 0.3s;
    }

    /* Hero */
    .hero {
      height: 100vh;
      min-height: 700px;
      background: linear-gradient(rgba(15, 39, 77, 0.65), rgba(15, 39, 77, 0.75)),
                  url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?ixlib=rb-4.0.3&auto=format&fit=crop&w=2340&q=80') center/cover no-repeat;
      color: white;
      display: flex;
      align-items: center;
      text-align: center;
      padding: 0 5%;
    }

    .hero-content {
      max-width: 900px;
      margin: 0 auto;
    }

    .hero h1 {
      font-size: clamp(3.2rem, 8vw, 6.5rem);
      margin-bottom: 1.5rem;
      line-height: 1.1;
    }

    .hero p {
      font-size: 1.35rem;
      margin-bottom: 2.5rem;
      max-width: 680px;
      margin-left: auto;
      margin-right: auto;
      opacity: 0.95;
    }

    .btn {
      display: inline-block;
      background: var(--accent);
      color: var(--primary-dark);
      padding: 1rem 2.4rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.3s;
      box-shadow: 0 8px 25px rgba(212,160,23,0.25);
    }

    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 35px rgba(212,160,23,0.35);
      background: #e6b923;
    }

    /* Seção Apartamentos em Destaque */
    .destaques {
      padding: 8rem 5%;
      background: white;
    }

    .section-title {
      text-align: center;
      margin-bottom: 4rem;
    }

    .section-title h2
